<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#16232b;
    --ink-soft:#41525c;
    --bg:#e9edee;
    --surface:#ffffff;
    --line:#d5dde0;
    --line-soft:#e6ecee;
    --trace:#0e9aa7;      /* oscilloscope teal */
    --trace-deep:#0a7580;
    --go:#3b9c6e;         /* on track / done */
    --warn:#e08a2b;       /* attention / blocked */
    --danger:#c65a4e;
    --track-ai:#5b6cff;
    --track-dsp:#0e9aa7;
    --track-animal:#c17d3e;
    --display:'Space Grotesk',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:var(--body);
    color:var(--ink);
    background:var(--bg);
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}

  /* ---------- header ---------- */
  .top{
    background:var(--ink);
    color:#eaf1f2;
    position:relative;
    overflow:hidden;
  }
  .top-wave{position:absolute;inset:0;width:100%;height:100%;opacity:.5}
  .top-inner{
    position:relative;
    max-width:1100px;margin:0 auto;
    padding:20px 24px 22px;
    display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .brand h1{
    font-family:var(--display);font-weight:700;font-size:20px;letter-spacing:.3px;margin:0;
  }
  .brand .tag{
    font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--trace);border:1px solid rgba(14,154,167,.5);border-radius:3px;padding:2px 7px;
  }
  .who{display:flex;align-items:center;gap:8px}
  .who label{font-family:var(--mono);font-size:11px;color:#9fb2b8;letter-spacing:.5px}
  .who select{
    background:#0e1a20;color:#eaf1f2;border:1px solid #33474f;border-radius:6px;
    padding:8px 10px;font-size:13px;min-width:150px;
  }
  .who button{
    background:transparent;color:var(--trace);border:1px solid #33474f;border-radius:6px;
    padding:8px 10px;font-size:12px;
  }
  .who button:hover{border-color:var(--trace)}

  /* ---------- tabs ---------- */
  .tabs{
    background:var(--surface);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:5;
  }
  .tabs-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;gap:2px;overflow-x:auto}
  .tab{
    background:none;border:none;padding:14px 16px;font-size:14px;color:var(--ink-soft);
    font-weight:500;border-bottom:2px solid transparent;white-space:nowrap;
  }
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--ink);border-bottom-color:var(--trace);font-weight:600}

  main{max-width:1100px;margin:0 auto;padding:26px 24px 80px}

  /* ---------- generic ---------- */
  .muted{color:var(--ink-soft)}
  .empty{
    border:1px dashed var(--line);border-radius:10px;padding:34px 20px;text-align:center;
    color:var(--ink-soft);background:var(--surface);
  }
  .empty strong{display:block;color:var(--ink);font-family:var(--display);font-size:16px;margin-bottom:6px}
  .section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .section-head h2{font-family:var(--display);font-weight:600;font-size:19px;margin:0}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--trace-deep);margin-bottom:3px}
  .btn{
    background:var(--ink);color:#fff;border:none;border-radius:7px;padding:9px 15px;font-size:13px;font-weight:500;
  }
  .btn:hover{background:#0c1a22}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--ink-soft)}
  .btn.sm{padding:6px 11px;font-size:12px}

  /* track chips */
  .chip{
    display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;
    padding:3px 8px;border-radius:20px;border:1px solid var(--line);color:var(--ink-soft);
  }
  .chip .dot{width:7px;height:7px;border-radius:50%}
  .chip.ai .dot{background:var(--track-ai)} .chip.dsp .dot{background:var(--track-dsp)} .chip.animal .dot{background:var(--track-animal)}

  /* ---------- checklist ---------- */
  .cl-head{
    display:flex;gap:22px;align-items:center;background:var(--surface);border:1px solid var(--line);
    border-radius:12px;padding:18px 22px;margin-bottom:22px;flex-wrap:wrap;
  }
  .cl-id h3{font-family:var(--display);font-size:18px;margin:0 0 4px}
  .cl-id .sub{font-family:var(--mono);font-size:12px;color:var(--ink-soft)}
  .cl-id .tracks{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
  .gauges{display:flex;gap:18px;margin-left:auto;flex-wrap:wrap}
  .gauge{text-align:center;width:78px}
  .gauge svg{display:block;margin:0 auto}
  .gauge .lab{font-family:var(--mono);font-size:10px;letter-spacing:.5px;color:var(--ink-soft);margin-top:4px;text-transform:uppercase}
  .gauge .pct{font-family:var(--display);font-weight:600;font-size:15px}

  .dim{margin-bottom:20px}
  .dim-title{
    display:flex;align-items:center;gap:9px;font-family:var(--display);font-weight:600;font-size:14px;
    margin:0 0 10px;color:var(--ink);
  }
  .dim-title .bar{width:3px;height:15px;border-radius:2px;background:var(--trace)}
  .dim-title .n{font-family:var(--mono);font-size:11px;color:var(--ink-soft);font-weight:400}
  .item{
    display:flex;gap:12px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);
    border-radius:9px;padding:12px 14px;margin-bottom:7px;cursor:pointer;transition:border-color .12s;
  }
  .item:hover{border-color:var(--trace)}
  .item.done{background:#f4faf7;border-color:#cfe8dc}
  .box{
    width:20px;height:20px;border-radius:5px;border:2px solid var(--line);flex:none;margin-top:1px;
    display:flex;align-items:center;justify-content:center;transition:.12s;
  }
  .item.done .box{background:var(--go);border-color:var(--go)}
  .box svg{opacity:0}
  .item.done .box svg{opacity:1}
  .item .txt{font-size:14px}
  .item.done .txt{color:var(--ink-soft);text-decoration:line-through;text-decoration-color:#bcd9cb}
  .item .tmark{font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:12px;margin-left:8px;vertical-align:middle;border:1px solid var(--line);color:var(--ink-soft)}
  .item-del{margin-left:auto;background:none;border:none;color:var(--ink-soft);font-size:17px;line-height:1;padding:0 4px;flex:none;align-self:center}
  .item-del:hover{color:var(--danger)}
  .tmark.pi{border-color:#dcd0ee;background:#f6f0fc;color:#6d4fa1}
  .item-btns{margin-left:auto;display:flex;gap:2px;align-self:center;flex:none}
  .ib{background:none;border:none;color:var(--ink-soft);font-size:16px;line-height:1;padding:0 5px;cursor:pointer}
  .ib:hover{color:var(--trace-deep)}
  .ib.del:hover{color:var(--danger)}
  .item.static{cursor:default}
  .item .frac{font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-left:8px}

  /* ---------- sub-items ---------- */
  .item-wrap{margin-bottom:7px}
  .item-wrap .item{margin-bottom:0}
  .subs{margin:5px 0 0 30px;display:flex;flex-direction:column;gap:3px}
  .sub{display:flex;gap:9px;align-items:flex-start;padding:5px 8px;border-radius:7px;cursor:pointer;font-size:13px}
  .sub:hover{background:#f2f7f7}
  .sub.static{cursor:default}
  .sub .box{width:16px;height:16px;border-radius:4px;margin-top:1px}
  .sub.done .box{background:var(--go);border-color:var(--go)}
  .sub .box svg{opacity:0}
  .sub.done .box svg{opacity:1}
  .sub.done .txt{color:var(--ink-soft);text-decoration:line-through;text-decoration-color:#bcd9cb}

  /* ---------- PI check panel (overview) ---------- */
  .ov-detail>td{background:#fbfcfc;padding:14px 18px}
  .pi-panel-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
  .tmark.core{border-color:#f2d9a0;background:#fdf6e5;color:#9a6b0f}
  .tmark.carry{border-color:#f2c4bd;background:#fdefec;color:#b0483a}
  .tmark.mod{border-color:#cfe3f5;background:#eef6fd;color:#2f6ea3}

  /* ---------- skill library ---------- */
  .lib-sec{display:flex;align-items:center;gap:9px;font-family:var(--display);font-weight:600;font-size:14px;margin:20px 0 10px}
  .lib-sec .bar{width:3px;height:15px;border-radius:2px;background:var(--trace)}
  .lib-row{display:flex;gap:12px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:10px 14px;margin-bottom:6px}
  .lib-row.off{opacity:.45}
  .lib-row .txt{font-size:13.5px}

  /* ---------- activity heatmap (PI 後台) ---------- */
  .act-row{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 18px;margin-bottom:12px}
  .act-head{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:10px;flex-wrap:wrap}
  .hm-wrap{overflow-x:auto;padding-bottom:4px}
  .hm{display:flex;gap:3px;width:max-content}
  .hm-days{display:flex;flex-direction:column;gap:3px;margin-right:5px}
  .hm-days span{width:14px;height:11px;font-family:var(--mono);font-size:9px;color:var(--ink-soft);line-height:11px}
  .hm-col{display:flex;flex-direction:column;gap:3px}
  .hm-c{width:11px;height:11px;border-radius:2px;background:var(--line-soft);display:block}
  .hm-c.fut{background:transparent}
  .hm-c.lv1{background:#a9dcb6}
  .hm-c.lv2{background:#55ac6c}
  .hm-c.lv3{background:#1e7a3c}
  .hm-legend{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10.5px;color:var(--ink-soft)}

  /* ---------- projects ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px 17px;position:relative}
  .card h3{font-family:var(--display);font-size:16px;margin:0 4px 10px 0;padding-right:60px}
  .card .owner{font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-bottom:12px}
  .status{
    position:absolute;top:15px;right:15px;font-family:var(--mono);font-size:10px;letter-spacing:.5px;
    padding:3px 8px;border-radius:20px;text-transform:uppercase;font-weight:500;
  }
  .st-todo{background:#eef1f2;color:#5b6b72}
  .st-active{background:#e5f5ef;color:#2f7d58}
  .st-blocked{background:#fbeee0;color:#b5711f}
  .st-review{background:#eae6fb;color:#5a4bb5}
  .st-done{background:#e7f0f2;color:var(--trace-deep)}
  .stage-rail{display:flex;gap:4px;margin:12px 0}
  .stage-rail .seg{flex:1;height:5px;border-radius:3px;background:var(--line-soft)}
  .stage-rail .seg.on{background:var(--trace)}
  .stage-lab{font-family:var(--mono);font-size:11px;color:var(--trace-deep);margin-bottom:12px}
  .kv{font-size:13px;margin:6px 0;color:var(--ink-soft)}
  .kv b{color:var(--ink);font-weight:600}
  .blockbox{background:#fdf5ec;border:1px solid #f2ddc2;border-radius:7px;padding:8px 10px;font-size:12.5px;color:#8a5a17;margin-top:10px}
  .links{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
  .links a{
    font-family:var(--mono);font-size:11px;color:var(--trace-deep);text-decoration:none;
    border:1px solid var(--line);border-radius:6px;padding:3px 8px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .links a:hover{border-color:var(--trace);background:#f0fafb}
  .card-actions{display:flex;gap:8px;margin-top:13px;border-top:1px solid var(--line-soft);padding-top:11px}
  .card-actions button{background:none;border:none;font-size:12px;color:var(--ink-soft);padding:2px 4px}
  .card-actions button:hover{color:var(--ink)}
  .card-actions .del:hover{color:var(--danger)}

  /* ---------- log timeline ---------- */
  .log{position:relative;padding-left:22px;margin-bottom:16px}
  .log::before{content:"";position:absolute;left:5px;top:6px;bottom:-16px;width:2px;background:var(--line)}
  .log:last-child::before{display:none}
  .log .node{position:absolute;left:0;top:5px;width:12px;height:12px;border-radius:50%;background:var(--trace);border:2px solid var(--surface);box-shadow:0 0 0 1px var(--line)}
  .log .date{font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-bottom:2px}
  .log .who-tag{font-family:var(--display);font-weight:600;font-size:13px;margin-bottom:8px}
  .log-row{font-size:13px;margin:4px 0;display:flex;gap:8px}
  .log-row .k{font-family:var(--mono);font-size:10px;letter-spacing:.5px;color:#fff;padding:1px 6px;border-radius:4px;flex:none;height:fit-content;margin-top:2px}
  .k-done{background:var(--go)} .k-block{background:var(--warn)} .k-next{background:var(--trace-deep)}

  /* ---------- overview table ---------- */
  .ov-wrap{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:12px 14px;font-size:13px;border-bottom:1px solid var(--line-soft)}
  th{font-family:var(--mono);font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-soft);background:#f6f8f8}
  tr:last-child td{border-bottom:none}
  .mini-bar{height:6px;border-radius:3px;background:var(--line-soft);width:90px;overflow:hidden;display:inline-block;vertical-align:middle}
  .mini-bar span{display:block;height:100%;background:var(--go)}
  .flag{font-family:var(--mono);font-size:11px;color:var(--warn)}
  .row-name{font-weight:600;font-family:var(--display)}
  .row-name small{display:block;font-family:var(--mono);font-weight:400;font-size:10px;color:var(--ink-soft)}

  /* ---------- modal ---------- */
  .scrim{position:fixed;inset:0;background:rgba(16,26,32,.5);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:20;overflow:auto}
  .modal{background:var(--surface);border-radius:14px;width:100%;max-width:460px;padding:24px;box-shadow:0 24px 60px rgba(0,0,0,.28)}
  .modal h3{font-family:var(--display);font-size:18px;margin:0 0 18px}
  .field{margin-bottom:14px}
  .field label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px}
  .field input,.field select,.field textarea{
    width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:14px;color:var(--ink);background:#fff;
  }
  .field textarea{resize:vertical;min-height:56px}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--trace);box-shadow:0 0 0 3px rgba(14,154,167,.13)}
  .track-pick{display:flex;gap:8px;flex-wrap:wrap}
  .track-pick .opt{border:1px solid var(--line);border-radius:20px;padding:6px 12px;font-size:13px;display:flex;align-items:center;gap:6px}
  .track-pick .opt.on{border-color:var(--trace);background:#f0fafb;color:var(--trace-deep);font-weight:500}
  .modal-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:20px}
  .hint{font-size:12px;color:var(--ink-soft);margin-top:4px}

  /* ---------- bilingual helpers ---------- */
  .h1en{font-family:var(--mono);font-size:10px;letter-spacing:1.6px;color:#9fb2b8;margin-top:2px;text-transform:uppercase}
  .ten{font-size:10.5px;color:var(--ink-soft);margin-left:5px;font-weight:400}
  .tab.active .ten{color:var(--trace-deep)}
  .ben{font-size:10px;opacity:.8;margin-left:5px;font-weight:400}
  .dim-en{font-family:var(--mono);font-size:11px;color:var(--ink-soft);font-weight:400}
  .item-en{display:block;font-size:12px;color:var(--ink-soft);margin-top:1px}
  .item.done .item-en{text-decoration:line-through;text-decoration-color:#bcd9cb}

  /* ---------- help page ---------- */
  .help-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px 22px;margin-bottom:14px}
  .help-card h3{font-family:var(--display);font-size:16px;margin:0 0 2px;display:flex;align-items:center;gap:8px}
  .help-card h3 .dim-en{font-size:11px}
  .help-en{color:var(--ink-soft);font-size:12.5px;margin-top:3px;line-height:1.5}
  .help-card p{font-size:14px;margin:8px 0 0}
  .help-card ol{margin:8px 0 0;padding-left:20px;font-size:14px}
  .help-card li{margin:8px 0}

  /* ---------- add-track row ---------- */
  .track-add{display:flex;gap:8px;margin-top:9px}
  .track-add input{flex:1;border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px;min-width:0}
  .track-pick .opt{cursor:pointer}
  .track-pick .opt .tdot{width:8px;height:8px;border-radius:50%;flex:none}

  /* ---------- weekly log options ---------- */
  .wk-tag{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:12px;margin-left:8px;vertical-align:middle}
  .plan-list{max-height:210px;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:6px 12px;background:#fff}
  .plan-list .plan-item{
    display:flex;gap:9px;align-items:flex-start;cursor:pointer;
    font-family:var(--body);font-size:13.5px;font-weight:400;color:var(--ink);
    text-transform:none;letter-spacing:0;margin:7px 0;
  }
  .plan-list .plan-item input{margin:3px 0 0;accent-color:var(--trace);flex:none;width:auto}
  .plan-list .plan-item .pi-en{display:block;font-size:11.5px;color:var(--ink-soft)}
  .plan-list .plan-item .plan-del{
    margin-left:auto;background:none;border:none;color:var(--ink-soft);
    font-size:16px;line-height:1;padding:0 4px;flex:none;cursor:pointer;
  }
  .plan-list .plan-item .plan-del:hover{color:var(--danger)}

  @media (max-width:620px){
    .gauges{margin-left:0;width:100%}
    .cl-head{padding:16px}
  }
  @media (prefers-reduced-motion:reduce){
    .top-wave{animation:none!important}
  }

  /* ---------- passcode gate ---------- */
  .gate{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
  .gate-card{background:var(--surface);border-radius:16px;padding:36px 32px;max-width:390px;width:100%;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.45)}
  .gate-card .lock{width:44px;height:44px;border-radius:12px;background:#f0fafb;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
  .gate-card h2{font-family:var(--display);font-size:22px;margin:0 0 6px;color:var(--ink)}
  .gate-card p{color:var(--ink-soft);font-size:13px;margin:0 0 20px;line-height:1.5}
  .gate-card input{width:100%;border:1px solid var(--line);border-radius:9px;padding:12px 14px;font-size:17px;text-align:center;letter-spacing:3px;color:var(--ink)}
  .gate-card input:focus{outline:none;border-color:var(--trace);box-shadow:0 0 0 3px rgba(14,154,167,.15)}
  .gate-card button{width:100%;margin-top:14px;background:var(--ink);color:#fff;border:none;border-radius:9px;padding:12px;font-size:15px;font-weight:500;cursor:pointer}
  .gate-card button:hover{background:#0c1a22}
  .gate-card button:disabled{opacity:.5;cursor:default}
  .gate-err{color:var(--danger);font-size:13px;margin-top:12px;min-height:18px}
</style>

<div class="top">
  <svg class="top-wave" id="wave" viewBox="0 0 1200 120" preserveAspectRatio="none" aria-hidden="true">
    <path id="wavePath" fill="none" stroke="var(--trace)" stroke-width="1.4" opacity="0.8"></path>
  </svg>
  <div class="top-inner">
    <div class="brand">
      <div>
        <h1 id="labName">研究室進度儀表板</h1>
        <div class="h1en">ANG Lab Progress Dashboard</div>
      </div>
      <span class="tag">Lab Signal</span>
    </div>
    <div class="who">
      <label>目前身分 Identity</label>
      <select id="whoSelect"></select>
      <button id="addStudentBtn">＋ 新增學生 Add</button>
      <button id="exportBtn" title="下載 Excel 檔（學生身分＝自己的資料；老師＝全實驗室）">📥 匯出 Export</button>

/* ---------------- storage adapter ----------------
   三種後端自動切換：
   1. 在 Claude 平台開啟 → 使用內建 window.storage（全體共享）
   2. 自行部署（GitHub Pages 等）→ 填入 FIREBASE_PROJECT 即改用 Firestore 雲端資料庫
   3. 兩者皆無 → localStorage（僅存在本機瀏覽器，示範用，不跨裝置共享）*/
const FIREBASE_PROJECT = 'ang-lab-tracker';   // ← 自行部署時填入 Firebase 專案 ID，例如 'mylab-tracker'

const hasClaudeStore = (typeof window.storage !== 'undefined') && window.storage && window.storage.get;
const fsUrl = key => 'https://firestore.googleapis.com/v1/projects/'+FIREBASE_PROJECT
  +'/databases/(default)/documents/labkv/'+encodeURIComponent(key);

async function loadKey(key, shared, fallback){
  try{
    if(hasClaudeStore){
      const r = await window.storage.get(key, shared);
      return r && r.value ? JSON.parse(r.value) : fallback;
    }
    if(FIREBASE_PROJECT){
      if(!shared){ // 個人設定（如身分選擇）存本機，避免全實驗室互相覆蓋
        const v = localStorage.getItem('lab:'+key);
        return v ? JSON.parse(v) : fallback;
      }
      const res = await fetch(fsUrl(key));
      if(!res.ok) return fallback;
      const d = await res.json();
      const v = d.fields && d.fields.value && d.fields.value.stringValue;
      return v ? JSON.parse(v) : fallback;
    }
    const v = localStorage.getItem('lab:'+key);
    return v ? JSON.parse(v) : fallback;
  }catch(e){ return fallback; }
}
async function saveKey(key, val, shared){
  try{
    const json = JSON.stringify(val);
    if(hasClaudeStore){ await window.storage.set(key, json, shared); return; }
    if(FIREBASE_PROJECT){
      if(!shared){ localStorage.setItem('lab:'+key, json); return; }
      await fetch(fsUrl(key)+'?updateMask.fieldPaths=value&updateMask.fieldPaths=gate', {
        method:'PATCH', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({fields:{value:{stringValue:json}, gate:{stringValue:GATE}}})
      });
      return;
    }
    localStorage.setItem('lab:'+key, json);
  }catch(e){ console.error('save failed', key, e); }
}

/* ============================================================
   結構化資料庫層（Firebase 模式）
   每筆資料＝一份 Firestore 文件，欄位對應輸入格，可在後台直接查詢：
     student_<id>      {type:'student', name, level, tier, tracks[]}
     project_<id>      {type:'project', owner, name, stage, status, milestone, deadline, blocker, links[]}
     log_<id>          {type:'log', owner, date, mood, project, plan[], planDone[], done, block, next, link}
     checklist_<sid>   {type:'checklist', owner, checks{項目id:布林}}
     customchecks_<sid>{type:'customchecks', owner, items[]}
     track_<id>        {type:'track', label, short, color}
   舊版整串 JSON 的 lab_* 文件保留作為備份，首次載入自動搬移。
   非 Firebase 模式（Claude／本機）沿用原本整包 JSON 的存法。
   ============================================================ */
const FB = () => FIREBASE_PROJECT && !hasClaudeStore;

function fsVal(v){
  if(v===null||v===undefined) return {nullValue:null};
  if(typeof v==='boolean') return {booleanValue:v};
  if(typeof v==='number') return Number.isInteger(v)?{integerValue:String(v)}:{doubleValue:v};
  if(Array.isArray(v)) return {arrayValue:{values:v.map(fsVal)}};
  if(typeof v==='object') return {mapValue:{fields:fsFields(v)}};
  return {stringValue:String(v)};
}
function fsFields(o){
  const f={}; Object.keys(o).forEach(k=>{ if(k!=='id') f[k]=fsVal(o[k]); }); return f;
}
function fsParse(v){
  if('stringValue' in v) return v.stringValue;
  if('booleanValue' in v) return v.booleanValue;
  if('integerValue' in v) return Number(v.integerValue);
  if('doubleValue' in v) return v.doubleValue;
  if('arrayValue' in v) return (v.arrayValue.values||[]).map(fsParse);
  if('mapValue' in v){ const o={}, f=v.mapValue.fields||{}; Object.keys(f).forEach(k=>o[k]=fsParse(f[k])); return o; }
  return null;
}
async function fsSaveDoc(docId, obj){
  try{
    await fetch(fsUrl(docId), {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({fields: fsFields({...obj, gate:GATE})})
    });
  }catch(e){ console.error('fsSaveDoc failed', docId, e); }
}
async function fsDeleteDoc(docId){
  try{ await fetch(fsUrl(docId), {method:'DELETE'}); }
  catch(e){ console.error('fsDeleteDoc failed', docId, e); }
}
async function fsListAll(){
  const base = 'https://firestore.googleapis.com/v1/projects/'+FIREBASE_PROJECT
    +'/databases/(default)/documents/labkv?pageSize=300';
  let docs=[], token=null;
  try{
    do{
      const res = await fetch(base+(token?'&pageToken='+encodeURIComponent(token):''));
      if(!res.ok) break;
      const d = await res.json();
      (d.documents||[]).forEach(doc=>{
        const o={_id:doc.name.split('/').pop()}, f=doc.fields||{};
        Object.keys(f).forEach(k=>o[k]=fsParse(f[k]));
        docs.push(o);
      });
      token = d.nextPageToken||null;
    }while(token);
  }catch(e){ console.error('fsListAll failed', e); }
  return docs;
}

const $ = sel => document.querySelector(sel);
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc = s => (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const me = () => S.students.find(s=>s.id===S.me) || null;
const today = () => new Date().toISOString().slice(0,10);

function visibleChecks(student){
  const st = S.checklists[student.id] || {};
  const trackOk = k => !k.track || student.tracks.includes(k.track);
  const active = S.skills.filter(k=>!k.off);
  // 1. 階段技能：符合目前年資（與領域）
  const stage = active.filter(k=>k.tier===student.tier && trackOk(k));
  // 2. 前階段未完成的必備技能自動帶入（同一學制內）
  const lvlTiers = (LEVELS[student.level]||{tiers:[]}).tiers;
  const ti = lvlTiers.indexOf(student.tier);
  const carry = active.filter(k=>k.core && k.tier
      && lvlTiers.indexOf(k.tier)>-1 && lvlTiers.indexOf(k.tier)<ti
      && trackOk(k) && itemVal(student.id, k, st)!==1)
    .map(k=>({...k, carry:true}));
  // 3. 模組技能：學生擁有的專案掛了哪些技能模組
  const myMods = new Set();
  S.projects.forEach(p=>{ if(p.owner===student.id) (p.modules||[]).forEach(m=>myMods.add(m)); });
  const modSkills = active.filter(k=>k.module && myMods.has(k.module));
  // 4. 教授指定＋自訂＋主項文字覆蓋
  const pi    = (S.piChecks[student.id] || []).map(c => ({...c, pi:true}));
  const extra = (S.custom[student.id] || []).map(c => ({...c, custom:true}));
  const ed = S.edits[student.id] || {};
  return carry.concat(stage).concat(modSkills).concat(pi).concat(extra)
    .map(it => ed[it.id] ? {...it, t:ed[it.id], edited:true} : it);
}
/* 必備技能達成（僅階段＋帶入的必備項；模組必備不擋升級） */
function coreStat(student){
  const st = checkState(student.id);
  const items = visibleChecks(student).filter(it=>it.core && it.tier && !it.module);
  const done = items.filter(it=>itemVal(student.id, it, st)===1).length;
  return [done, items.length];
}
function checkState(sid){ return S.checklists[sid] || {}; }
function subsOf(sid, itemId){ return (S.subs[sid] || {})[itemId] || []; }
/* 有子項的檢核項，完成度＝已勾子項/全部子項；無子項則看主項勾選 */
function itemVal(sid, it, st){
  const subs = subsOf(sid, it.id);
  if(subs.length) return subs.filter(sb=>st[sb.id]).length / subs.length;
  return st[it.id] ? 1 : 0;
}
/* 刪除檢核項時，一併清掉其勾選狀態、子項與子項勾選狀態 */
function removeItemState(sid, itemId){
  const subs = subsOf(sid, itemId);
  if(S.checklists[sid]){
    delete S.checklists[sid][itemId];
    subs.forEach(sb=>delete S.checklists[sid][sb.id]);
  }
  if(S.subs[sid]) delete S.subs[sid][itemId];
  if(S.edits[sid]) delete S.edits[sid][itemId];
}
function progress(student){
  const items = visibleChecks(student), st = checkState(student.id);
  const by = {skill:[0,0], project:[0,0], citizen:[0,0], all:[0,0]};
  items.forEach(it=>{
    const v = itemVal(student.id, it, st);
    by[it.dim][0]+=v; by[it.dim][1]++;
    by.all[0]+=v; by.all[1]++;
  });
  return by;
}
function pct(pair){ return pair[1] ? Math.round(pair[0]/pair[1]*100) : 0; }

/* ---------------- header waveform (signature) ---------------- */
function animateWave(){
  const path = $('#wavePath'); if(!path) return;
  const reduce = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  const W=1200, H=120, mid=H/2;
  function build(t){
    let d='M 0 '+mid;
    for(let x=0;x<=W;x+=8){
      const y = mid
        + Math.sin((x*0.012)+t)*16
        + Math.sin((x*0.03)+t*1.7)*8
        + Math.sin((x*0.005)-t*0.6)*10;
      d += ' L '+x+' '+y.toFixed(1);
    }
    path.setAttribute('d', d);
  }
  if(reduce){ build(0); return; }
  let t=0; (function loop(){ t+=0.03; build(t); requestAnimationFrame(loop); })();
}

const CHECK_SVG = '<svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 6l3 3 5-6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
function checkListHTML(s, mode){

  let body='';
  Object.keys(DIMS).forEach(dim=>{
    const items = visibleChecks(s).filter(i=>i.dim===dim);
    if(!items.length) return;
    const doneN = items.filter(i=>itemVal(s.id, i, st)===1).length;
    body += '<div class="dim"><div class="dim-title"><span class="bar"></span>'+DIMS[dim]
      +' <span class="dim-en">'+DIMS_EN[dim]+'</span>'
      +' <span class="n">'+doneN+'/'+items.length+'</span></div>';
    items.forEach(it=>{ body += itemHTML(s, it, st, mode); });
    body += '</div>';
  });
  return body;
}
function itemHTML(s, it, st, mode){
  const subs = subsOf(s.id, it.id);
  const v = itemVal(s.id, it, st);
  const done = v===1;
  const tk = it.track ? '<span class="tmark">'+esc((TRACKS[it.track]||{}).short||it.track)+'</span>' : '';
  const pm = it.pi ? '<span class="tmark pi">教授指定 PI</span>' : '';
  const cm = it.custom ? '<span class="tmark">自訂 custom</span>' : '';
  const em2 = it.edited ? '<span class="tmark">已修改 edited</span>' : '';
  const coreTag = it.core ? '<span class="tmark core">★必備 core</span>' : '';
  const carryTag = it.carry ? '<span class="tmark carry">'+it.tier+' 未完成 carry-over</span>' : '';
  const modItem = it.module ? S.modules.find(x=>x.id===it.module) : null;
  const modTag = modItem ? '<span class="tmark mod">'+esc(modItem.label)+'</span>' : '';
  const frac = subs.length ? '<span class="frac">'+subs.filter(sb=>st[sb.id]).length+'/'+subs.length+'</span>' : '';
  const en = (it.en && !it.edited) ? '<span class="item-en">'+esc(it.en)+'</span>' : '';
  // 有子項時主項狀態由子項推導，不能直接點；老師面板一律唯讀（由學生自己勾）
  const canToggle = mode==='student' && !subs.length;
  // 編輯權限：學生可改內建項與自訂項；教授指定項只有老師（總覽面板）能改
  const canEdit = mode==='student' ? !it.pi : !!it.pi;
  let btns = '';
  if(canEdit) btns += '<button class="ib" data-editck="'+it.id+'" title="編輯此項 Edit">✎</button>';
  btns += '<button class="ib" data-addsub="'+it.id+'" title="新增子項目 Add sub-item">＋</button>';
  if(mode==='student' && it.custom) btns += '<button class="ib del" data-cdel="'+it.id+'" title="刪除此自訂項 Delete">×</button>';
  if(mode==='pi' && it.pi) btns += '<button class="ib del" data-pidel="'+it.id+'" title="刪除此指定檢核項 Delete">×</button>';
  let h = '<div class="item-wrap">'
    + '<div class="item'+(done?' done':'')+(canToggle?'':' static')+'"'+(canToggle?' data-id="'+it.id+'"':'')+'>'
    + '<div class="box">'+CHECK_SVG+'</div>'
    + '<div class="txt">'+esc(it.t)+coreTag+carryTag+modTag+tk+pm+cm+em2+frac+en+'</div>'
    + '<div class="item-btns">'+btns+'</div></div>';
  if(subs.length){
    h += '<div class="subs">';
    subs.forEach(sb=>{
      const sd = !!st[sb.id];
      const canDel = mode==='pi' ? sb.by==='pi' : sb.by!=='pi';
      const spm = sb.by==='pi' ? '<span class="tmark pi">教授 PI</span>' : '';
      h += '<div class="sub'+(sd?' done':'')+(mode==='student'?'':' static')+'"'+(mode==='student'?' data-sub="'+sb.id+'"':'')+'>'
        + '<div class="box">'+CHECK_SVG+'</div>'
        + '<div class="txt">'+esc(sb.t)+spm+'</div>'
        + (canDel?'<div class="item-btns"><button class="ib del" data-sdel="'+it.id+':'+sb.id+'" title="刪除此子項目 Delete">×</button></div>':'')
        + '</div>';
    });
    h += '</div>';
  }
  return h + '</div>';
}
function bindCheckItems(sid, mode){
  const stu = S.students.find(x=>x.id===sid);
  document.querySelectorAll('.item[data-id]').forEach(el=>el.addEventListener('click', ()=>{
    if(!S.checklists[sid]) S.checklists[sid]={};
    S.checklists[sid][el.dataset.id] = !S.checklists[sid][el.dataset.id];
    dbSaveChecklist(sid); render();
  }));
  document.querySelectorAll('.sub[data-sub]').forEach(el=>el.addEventListener('click', ()=>{
    if(!S.checklists[sid]) S.checklists[sid]={};
    S.checklists[sid][el.dataset.sub] = !S.checklists[sid][el.dataset.sub];
    dbSaveChecklist(sid); render();
  }));
  document.querySelectorAll('[data-addsub]').forEach(b=>b.addEventListener('click', e=>{
    e.stopPropagation();
    openSubModal(sid, b.dataset.addsub, mode==='pi');
  }));
  document.querySelectorAll('[data-editck]').forEach(b=>b.addEventListener('click', e=>{
    e.stopPropagation();
    const it = stu && visibleChecks(stu).find(i=>i.id===b.dataset.editck);
    if(it) openEditItemModal(sid, it, mode);
  }));
  document.querySelectorAll('[data-sdel]').forEach(b=>b.addEventListener('click', e=>{
    e.stopPropagation();
    if(!confirm('刪除這個子項目？Delete this sub-item?')) return;
    const parts = b.dataset.sdel.split(':'), pid = parts[0], sbid = parts[1];
    if(S.subs[sid]) S.subs[sid][pid] = (S.subs[sid][pid]||[]).filter(x=>x.id!==sbid);
    if(S.checklists[sid]) delete S.checklists[sid][sbid];
    saveKey('lab_check_subs', S.subs, true);
    dbSaveChecklist(sid);
    render();
  }));
  document.querySelectorAll('[data-cdel]').forEach(b=>b.addEventListener('click', e=>{
    e.stopPropagation();
    if(!confirm('刪除這個自訂檢核項？Delete this custom item?')) return;
    S.custom[sid] = (S.custom[sid]||[]).filter(c=>c.id!==b.dataset.cdel);
    removeItemState(sid, b.dataset.cdel);
    dbSaveCustomChecks(sid);
    saveKey('lab_check_subs', S.subs, true);
    dbSaveChecklist(sid);
    render();
  }));
  document.querySelectorAll('[data-pidel]').forEach(b=>b.addEventListener('click', e=>{
    e.stopPropagation();
    if(!confirm('刪除這個指定檢核項？學生已勾的狀態與子項會一併移除。')) return;
    S.piChecks[sid] = (S.piChecks[sid]||[]).filter(c=>c.id!==b.dataset.pidel);
    removeItemState(sid, b.dataset.pidel);
    saveKey('lab_pi_checks', S.piChecks, true);
    saveKey('lab_check_subs', S.subs, true);
    dbSaveChecklist(sid);
    render();
  }));
}

function openSubModal(sid, parentId, byPi){

    '<div class="scrim" id="scrim"><div class="modal">'
    + '<h3>新增子項目 <span class="dim-en">Add sub-item</span></h3>'

    + '<button class="btn" id="sbSave">新增 Add</button></div></div></div>';

  $('#sbCancel').addEventListener('click', closeModal);

    if(!t){ alert('請輸入子項內容'); return; }

    if(!S.subs[sid][parentId]) S.subs[sid][parentId]=[];
    S.subs[sid][parentId].push({id:'sb-'+uid(), t, by: byPi?'pi':'me'});
    saveKey('lab_check_subs', S.subs, true);

  });
}

/* 編輯主項文字：自訂項／教授指定項直接改原資料；內建項存個人覆蓋（可還原預設） */
function openEditItemModal(sid, it, mode){
  const isBuiltin = !it.pi && !it.custom;
  $('#modalRoot').innerHTML =
    '<div class="scrim" id="scrim"><div class="modal">'
    + '<h3>編輯檢核項 <span class="dim-en">Edit item</span></h3>'
    + '<div class="field"><label>檢核內容 Description</label><textarea id="edText">'+esc(it.t)+'</textarea>'
    + (isBuiltin?'<div class="hint">內建項目的修改只影響這位學生的清單，可隨時還原預設文字。<br>Edits to built-in items affect this student only; restore the default anytime.</div>':'')
    + '</div>'
    + '<div class="modal-actions">'
    + (isBuiltin && it.edited ? '<button class="btn ghost" id="edReset" style="margin-right:auto">還原預設 Restore</button>' : '')
    + '<button class="btn ghost" id="edCancel">取消 Cancel</button>'
    + '<button class="btn" id="edSave">儲存 Save</button></div></div></div>';
  $('#scrim').addEventListener('click', e=>{ if(e.target.id==='scrim') closeModal(); });
  $('#edCancel').addEventListener('click', closeModal);
  const er = $('#edReset');
  if(er) er.addEventListener('click', ()=>{
    if(S.edits[sid]) delete S.edits[sid][it.id];
    saveKey('lab_check_edits', S.edits, true);
    closeModal(); render();
  });
  $('#edSave').addEventListener('click', ()=>{
    const t = $('#edText').value.trim();
    if(!t){ alert('請輸入檢核內容'); return; }
    if(it.custom){
      const rec = (S.custom[sid]||[]).find(c=>c.id===it.id);
      if(rec){ rec.t = t; dbSaveCustomChecks(sid); }
    }else if(it.pi){
      const rec = (S.piChecks[sid]||[]).find(c=>c.id===it.id);
      if(rec){ rec.t = t; saveKey('lab_pi_checks', S.piChecks, true); }
    }else{
      if(!S.edits[sid]) S.edits[sid]={};
      S.edits[sid][it.id] = t;
      saveKey('lab_check_edits', S.edits, true);
    }
    closeModal(); render();
  });
}

/* 交互 3：專案卡片顯示該專案最近一次週報 */
function projLastUpdate(p){
  let pl = null; // 同日多則以較晚送出者為準
  S.logs.forEach(l=>{ if(l.project===p.id && (!pl || l.date>=pl.date)) pl=l; });
  if(!pl) return '';
  const wk = WK_STATUS[pl.mood];
  return '<div class="kv"><b>最新週報 Update：</b>'+esc(pl.date)
    + (wk?' <span class="wk-tag" style="background:'+wk.bg+';color:'+wk.color+';margin-left:4px">'+wk.label+' '+wk.en+'</span>':'')
    + '</div>';
}
function projectCard(p){
  const stg = STAGES.indexOf(p.stage); const stt = STATUS[p.status]||STATUS.todo;
  const rail = STAGES.map((s,i)=>'<div class="seg'+(i<=stg?' on':'')+'"></div>').join('');
  const links = (p.links||[]).map(l=>'<a href="'+esc(l.url)+'" target="_blank" rel="noopener">🔗 '+esc(l.name||l.url)+'</a>').join('');
  const modNames = (p.modules||[]).map(id=>{ const m=S.modules.find(x=>x.id===id); return m?m.label:''; }).filter(Boolean);
  return '<div class="card">'
    + '<span class="status '+stt.cls+'">'+stt.label+' '+stt.en+'</span>'
    + '<h3>'+esc(p.name)+'</h3>'
    + '<div class="stage-rail">'+rail+'</div>'
    + '<div class="stage-lab">管線站點 Stage：'+esc(p.stage)+' '+(STAGE_EN[p.stage]||'')+'</div>'
    + (modNames.length?'<div class="kv"><b>技能模組 Modules：</b>'+esc(modNames.join('、'))+'</div>':'')
    + (p.milestone?'<div class="kv"><b>里程碑 Milestone：</b>'+esc(p.milestone)+'</div>':'')
    + (p.deadline?'<div class="kv"><b>期限 Due：</b>'+esc(p.deadline)+'</div>':'')
    + projLastUpdate(p)
    + (p.blocker?'<div class="blockbox">⚠ 卡點 Blocker：'+esc(p.blocker)+'</div>':'')
    + (links?'<div class="links">'+links+'</div>':'')
    + '<div class="card-actions"><button data-edit="'+p.id+'">編輯 Edit</button>'
    + '<button class="del" data-del="'+p.id+'">刪除 Delete</button></div></div>';
}

/* ---------- weekly log view ---------- */
function viewLog(){
  const s = me(), st = checkState(s.id);
  const mine = S.logs.filter(l=>l.owner===S.me).sort((a,b)=>b.date.localeCompare(a.date));
  const myProjs = S.projects.filter(p=>p.owner===S.me);
  const myPlans = S.plans[S.me] || [];
  const planTexts = new Set(myPlans.map(i=>i.t));   // 已在待辦清單的不重複列入挑選區
  const todoChecks = visibleChecks(s).filter(it=>!st[it.id] && !planTexts.has(it.t));
  const miles = myProjs.filter(p=>p.milestone && p.status!=='done' && !planTexts.has('【'+p.name+'】'+p.milestone));

  const moodOpts = Object.keys(WK_STATUS).map(k=>
    '<div class="opt'+(k==='ok'?' on':'')+'" data-mood="'+k+'">'
    + '<span class="tdot" style="background:'+WK_STATUS[k].color+'"></span>'
    + WK_STATUS[k].label+' '+WK_STATUS[k].en+'</div>').join('');

  const projField = myProjs.length
    ? '<div class="field"><label>關聯專案 Related project</label><select id="lgProj">'
      + '<option value="">—（不指定 None）</option>'
      + myProjs.map(p=>'<option value="'+p.id+'">'+esc(p.name)+'</option>').join('')
      + '</select></div>'
    : '';

  const planItems = todoChecks.map(it=>
      '<label class="plan-item"><input type="checkbox" value="'+esc(it.t)+'"><span>'+esc(it.t)
      + (it.en?'<span class="pi-en">'+esc(it.en)+'</span>':'')+'</span></label>')
    .concat(miles.map(p=>
      '<label class="plan-item"><input type="checkbox" value="'+esc('【'+p.name+'】'+p.milestone)+'"><span>【'+esc(p.name)+'】'+esc(p.milestone)
      + '<span class="pi-en">專案里程碑 Project milestone</span></span></label>'))
    .join('');
  const planField = '<div class="field"><label>新增下週計畫（從你的檢核項／專案里程碑勾選）Add to plan (pick items)</label>'
    + (planItems
        ? '<div class="plan-list" id="lgPlan">'+planItems+'</div>'
        : '<div class="hint">目前沒有可新增的檢核項或里程碑。No more items to add.</div>')
    + '</div>';

  /* 待辦計畫：之前送出的計畫會一直留在這裡，勾選「已完成」送出後才移除；
     未勾選的自動延續到下一次週報。按 × 可直接移除（更改計畫）。 */
  const lastPlanField = myPlans.length
    ? '<div class="field"><label>待辦計畫（勾選已完成的）Outstanding plan — tick what you finished</label>'
      + '<div class="plan-list" id="lgPrev">'
      + myPlans.map(it=>'<label class="plan-item"><input type="checkbox" value="'+esc(it.id)+'"><span>'+esc(it.t)
        + (it.added?'<span class="pi-en">加入於 added '+esc(it.added)+'</span>':'')+'</span>'
        + '<button type="button" class="plan-del" data-pdel="'+esc(it.id)+'" title="移除此計畫（不算完成）Remove">×</button></label>').join('')
      + '</div><div class="hint">勾選＝已完成，送出週報後移除並自動勾對應檢核項；沒勾的會自動延續到下次。按 × 直接移除（更改計畫）。'
      + '<br>Ticked items are completed on submit (matching checklist items auto-check); unticked ones carry over. Press × to drop an item.</div></div>'
    : '';

  const form = '<div class="card" style="margin-bottom:20px">'
    + '<div class="field"><label>週報日期 Date</label><input type="date" id="lgDate" value="'+today()+'"></div>'
    + '<div class="field"><label>本週狀態 Status this week</label><div class="track-pick" id="lgMood">'+moodOpts+'</div></div>'
    + projField
    + lastPlanField
    + '<div class="field"><label>這週完成了什麼 What did you finish</label><textarea id="lgDone" placeholder="例：完成濾波前處理，跑通 baseline 模型…"></textarea></div>'
    + '<div class="field"><label>卡在哪裡 Where are you stuck</label><textarea id="lgBlock" placeholder="例：動物取樣時程與器材衝突…（沒有可留空 optional）"></textarea></div>'
    + planField
    + '<div class="field"><label>下週補充說明 Extra notes for next week（可留空 optional）</label><textarea id="lgNext" placeholder="例：加入資料擴增、重跑實驗…"></textarea></div>'
    + '<div class="field"><label>進度連結 Links（貼 Drive／GitHub／Notebook 網址，可留空 optional）</label><input id="lgLink" placeholder="https://…"></div>'
    + '<div style="text-align:right"><button class="btn" id="lgSubmit">送出週報<span class="ben">Submit</span></button></div></div>';

  let timeline = mine.map(l=>{
    const wk = WK_STATUS[l.mood];
    const moodTag = wk ? '<span class="wk-tag" style="background:'+wk.bg+';color:'+wk.color+'">'+wk.label+' '+wk.en+'</span>' : '';
    const pj = l.project ? S.projects.find(p=>p.id===l.project) : null;
    const pjTag = pj ? '<span class="wk-tag" style="background:#f0fafb;color:var(--trace-deep)">📁 '+esc(pj.name)+'</span>' : '';
    const link = l.link ? '<div class="log-row"><span class="k k-next">連結</span><a href="'+esc(l.link)+'" target="_blank" rel="noopener" style="font-family:var(--mono);font-size:12px;color:var(--trace-deep)">'+esc(l.link)+'</a></div>' : '';
    const nextTxt = [
      (l.plan && l.plan.length) ? l.plan.map(t=>'☑ '+esc(t)).join('<br>') : '',
      l.next ? esc(l.next) : ''
    ].filter(Boolean).join('<br>');
    const doneTxt = [
      (l.planDone && l.planDone.length) ? l.planDone.map(t=>'✅ '+esc(t)).join('<br>') : '',
      l.done ? esc(l.done) : ''
    ].filter(Boolean).join('<br>');
    return '<div class="log"><div class="node"></div>'
      + '<div class="date">'+esc(l.date)+moodTag+pjTag+'</div>'
      + (doneTxt?'<div class="log-row"><span class="k k-done">完成</span><span>'+doneTxt+'</span></div>':'')
      + (l.block?'<div class="log-row"><span class="k k-block">卡關</span><span>'+esc(l.block)+'</span></div>':'')
      + (nextTxt?'<div class="log-row"><span class="k k-next">下週</span><span>'+nextTxt+'</span></div>':'')
      + link + '</div>';
  }).join('');
  if(!mine.length) timeline = '<div class="empty"><strong>還沒有週報 No updates yet</strong>用上面的表單送出第一則，進度會自動存下並排成時間軸。<br><span style="font-size:12.5px">Submit your first update with the form above — entries are saved and shown as a timeline.</span></div>';

  return '<div class="section-head"><div><div class="eyebrow">Weekly Update</div>'
    + '<h2>週報進度 <span class="dim-en">Weekly Updates</span></h2></div></div>'+form+timeline;
}
function bindLog(){
  const mp = $('#lgMood');
  if(mp) mp.querySelectorAll('.opt').forEach(o=>o.addEventListener('click',()=>{
    mp.querySelectorAll('.opt').forEach(x=>x.classList.remove('on'));
    o.classList.add('on');
  }));
  /* × 移除待辦計畫（更改計畫用，不算完成；只移除該列，不動到表單其他輸入） */
  document.querySelectorAll('[data-pdel]').forEach(bt=>bt.addEventListener('click', e=>{
    e.preventDefault(); e.stopPropagation();
    const s = me();
    S.plans[s.id] = (S.plans[s.id]||[]).filter(i=>i.id!==bt.dataset.pdel);
    dbSavePlans(s.id);
    bt.closest('.plan-item').remove();
  }));
  const b=$('#lgSubmit'); if(!b) return;
  b.addEventListener('click',()=>{
    const done=$('#lgDone').value.trim(), block=$('#lgBlock').value.trim(),
          next=$('#lgNext').value.trim(), link=$('#lgLink').value.trim(), date=$('#lgDate').value||today();
    const moodEl = $('#lgMood .opt.on');
    const mood = moodEl ? moodEl.dataset.mood : 'ok';
    const project = $('#lgProj') ? $('#lgProj').value : '';
    const plan = $('#lgPlan') ? [...$('#lgPlan').querySelectorAll('input:checked')].map(i=>i.value) : [];
    const doneIds = $('#lgPrev') ? [...$('#lgPrev').querySelectorAll('input:checked')].map(i=>i.value) : [];
    const myPlans = S.plans[S.me]||[];
    const planDone = myPlans.filter(i=>doneIds.includes(i.id)).map(i=>i.t);
    if(!done && !block && !next && !plan.length && !planDone.length){ alert('至少填一欄或勾選一項再送出。Fill in or pick at least one item.'); return; }

    /* 交互 1：勾了「已完成」的上週計畫，若對應檢核項 → 自動打勾 */
    if(planDone.length){
      const s = me(), items = visibleChecks(s);
      let touched = false;
      planDone.forEach(txt=>{
        const it = items.find(i=>i.t===txt);
        if(it && !(S.checklists[s.id]&&S.checklists[s.id][it.id])){
          if(!S.checklists[s.id]) S.checklists[s.id]={};
          S.checklists[s.id][it.id]=true; touched=true;
        }
      });
      if(touched) dbSaveChecklist(s.id);
    }

    /* 交互 2：週報狀態與關聯專案連動（卡關→專案卡關並回填卡點；順利→解除卡關） */
    if(project){
      const pj = S.projects.find(p=>p.id===project);
      if(pj){
        let changed = false;
        if(mood==='blocked'){
          if(pj.status!=='blocked'){ pj.status='blocked'; changed=true; }
          if(block && pj.blocker!==block){ pj.blocker=block; changed=true; }
        }else if(mood==='ok' && pj.status==='blocked'){
          pj.status='active'; pj.blocker=''; changed=true;
        }
        if(changed) dbSaveProject(pj);
      }
    }

    /* 更新待辦計畫：勾「已完成」的移除；新勾選的加入並持續追蹤到完成為止 */
    let plansChanged = false;
    if(doneIds.length){
      S.plans[S.me] = myPlans.filter(i=>!doneIds.includes(i.id));
      plansChanged = true;
    }
    if(plan.length){
      S.plans[S.me] = S.plans[S.me]||[];
      plan.forEach(t=>{
        if(!S.plans[S.me].some(i=>i.t===t)){
          S.plans[S.me].push({id:'p'+uid(), t, added:date});
          plansChanged = true;
        }
      });
    }
    if(plansChanged) dbSavePlans(S.me);

    const nl = {id:uid(), owner:S.me, date, mood, project, plan, planDone, done, block, next, link};
    S.logs.push(nl);
    dbSaveLog(nl); render();
  });
}

/* ---------- 學生活躍度後台（僅老師：需管理密碼，SHA-256 驗證，原始碼只存雜湊） ---------- */
const ADMIN_HASH = '363f090da730361589bcce1b2533c08fbc4522d1636bfe80ae4b78fcfa6a090a';
async function sha256hex(s){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
function openAdminGate(){
  $('#modalRoot').innerHTML =
    '<div class="scrim" id="scrim"><div class="modal" style="max-width:360px">'
    + '<h3>管理密碼 <span class="dim-en">Admin passcode</span></h3>'
    + '<div class="field"><label>此頁僅供老師檢視 PI only</label>'
    + '<input id="adPass" type="password" autocomplete="off" placeholder="管理密碼"></div>'
    + '<div class="gate-err" id="adErr" style="margin-top:0"></div>'
    + '<div class="modal-actions"><button class="btn ghost" id="adCancel">取消 Cancel</button>'
    + '<button class="btn" id="adOk">進入 Enter</button></div></div></div>';
  $('#scrim').addEventListener('click', e=>{ if(e.target.id==='scrim') closeModal(); });
  $('#adCancel').addEventListener('click', closeModal);
  const input = $('#adPass'); input.focus();
  async function attempt(){
    let h = '';
    try{ h = await sha256hex(input.value.trim()); }
    catch(e){ $('#adErr').textContent = '此瀏覽器環境不支援驗證（需 https）。'; return; }
    if(h===ADMIN_HASH){
      try{ sessionStorage.setItem('lab_admin','ok'); }catch(e){}
      closeModal(); S.actOpen = true; render();
    }else{
      $('#adErr').textContent = '密碼不正確，請再試一次。';
      input.select();
    }
  }
  $('#adOk').addEventListener('click', attempt);
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') attempt(); });
}
/* GitHub 風格熱力圖：近 26 週，欄=週、列=週日～週六；灰=無活動，綠=有開啟 */
function heatmap(sid){
  const acts = S.activity[sid] || {};
  const now = new Date();
  const t0 = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate());
  const endDow = new Date(t0).getUTCDay();   // 0=週日
  let html = '<div class="hm-wrap"><div class="hm">'
    + '<div class="hm-days"><span></span><span>一</span><span></span><span>三</span><span></span><span>五</span><span></span></div>';
  for(let w=25; w>=0; w--){
    html += '<div class="hm-col">';
    for(let d=0; d<7; d++){
      const daysAgo = w*7 + endDow - d;
      if(daysAgo < 0){ html += '<span class="hm-c fut"></span>'; continue; }
      const ds = new Date(t0 - daysAgo*864e5).toISOString().slice(0,10);
      const n = acts[ds] || 0;
      const lv = n===0 ? 0 : n===1 ? 1 : n<4 ? 2 : 3;
      html += '<span class="hm-c'+(lv?' lv'+lv:'')+'" title="'+ds+(n?'　開啟 '+n+' 次':'　無活動')+'"></span>';
    }
    html += '</div>';
  }
  return html + '</div></div>';
}
function viewActivity(){
  const rows = S.students.map(s=>{
    const acts = S.activity[s.id] || {};
    const dates = Object.keys(acts).sort();
    const last = dates[dates.length-1] || null;
    const staleDays = last ? Math.round((Date.now() - new Date(last).getTime())/864e5) : null;
    const totalN = dates.reduce((a,d)=>a+acts[d], 0);
    const info = last
      ? '最後活動 '+last+(staleDays>0 ? '（'+staleDays+' 天前）' : '（今天）')+' · 累計 '+totalN+' 次開啟'
      : '尚無紀錄 no activity yet';
    return '<div class="act-row"><div class="act-head">'
      + '<span class="row-name">'+esc(s.name)+'<small>'+LEVELS[s.level].label+' · '+s.tier+' '+TIER_META[s.tier].name+'</small></span>'
      + '<span class="hint" style="margin:0'+(staleDays!==null&&staleDays>9?';color:var(--warn)':'')+'">'+info+'</span></div>'
      + heatmap(s.id) + '</div>';
  }).join('');
  return '<div class="section-head"><div><div class="eyebrow">PI Dashboard</div>'
    + '<h2>學生活躍度 <span class="dim-en">Student Activity</span></h2></div>'
    + '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'
    + '<span class="hm-legend">少 <span class="hm-c"></span><span class="hm-c lv1"></span><span class="hm-c lv2"></span><span class="hm-c lv3"></span> 多</span>'
    + '<button class="btn ghost sm" id="actBack">← 回總覽 Back</button></div></div>'
    + '<p class="hint">每格＝一天（近 26 週）。學生以自己的身分開啟網頁就會記錄一次；灰色＝當天沒有開啟。此頁需管理密碼，學生看不到內容。紀錄從功能上線日（2026-07-10）開始。</p>'
    + (S.students.length ? rows : '<div class="empty"><strong>還沒有學生資料</strong></div>');
}

/* ---------------- Excel 匯出 ----------------
   學生身分：匯出自己的資料；老師／未選身分：匯出全實驗室。
   使用 SheetJS（按下按鈕才載入，不拖慢開頁速度）。 */
function ensureXLSX(){
  return new Promise((res, rej)=>{
    if(window.XLSX) return res();
    const sc = document.createElement('script');
    sc.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    sc.onload = res; sc.onerror = ()=>rej(new Error('xlsx load failed'));
    document.head.appendChild(sc);
  });
}
async function exportData(targetSid){
  const btn = $('#exportBtn');
  btn.disabled = true; btn.textContent = '匯出中…';
  try{ await ensureXLSX(); }
  catch(e){ alert('匯出元件載入失敗，請檢查網路後再試。Export library failed to load.'); btn.disabled=false; btn.textContent='📥 匯出 Export'; return; }

  const sid = (typeof targetSid==='string' && targetSid) ? targetSid
            : (S.me && S.me!=='__pi__' ? S.me : null);
  const studs = sid ? S.students.filter(s=>s.id===sid) : S.students;
  const ids = new Set(studs.map(s=>s.id));
  const sname = id => (S.students.find(s=>s.id===id)||{}).name || '';
  const wb = XLSX.utils.book_new();

  const stuRows = studs.map(s=>{
    const by = progress(s), tm = TIER_META[s.tier];
    return {姓名:s.name, 學制:LEVELS[s.level].label, 年資:s.tier+' '+tm.name,
      領域:s.tracks.map(t=>(TRACKS[t]||{label:t}).label).join('、'),
      '總達成%':pct(by.all), '研究技能%':pct(by.skill), '專案進度%':pct(by.project), '實驗室事務%':pct(by.citizen)};
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(stuRows), '學生');

  const ckRows = [];
  studs.forEach(s=>{
    const st = checkState(s.id);
    visibleChecks(s).forEach(it=>{
      const v = itemVal(s.id, it, st);
      ckRows.push({學生:s.name, 維度:DIMS[it.dim], 檢核項:it.t,
        English:it.en||'', 狀態:v===1?'完成':(v>0?Math.round(v*100)+'%':'未完成'),
        必備:it.core?'★':'', 自訂:it.custom?'是':'', 教授指定:it.pi?'是':'',
        子項:subsOf(s.id, it.id).map(sb=>(st[sb.id]?'☑':'☐')+sb.t).join('；')});
    });
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(ckRows), '檢核明細');

  const pjRows = S.projects.filter(p=>ids.has(p.owner)).map(p=>({
    負責人:sname(p.owner), 專案:p.name, 管線站點:p.stage, 狀態:(STATUS[p.status]||{label:p.status}).label,
    里程碑:p.milestone||'', 期限:p.deadline||'', 卡點:p.blocker||'',
    連結:(p.links&&p.links[0])?p.links[0].url:''}));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(pjRows), '專案');

  const lgRows = S.logs.filter(l=>ids.has(l.owner))
    .sort((a,b)=>a.date.localeCompare(b.date))
    .map(l=>({學生:sname(l.owner), 日期:l.date, 本週狀態:(WK_STATUS[l.mood]||{label:''}).label,
      關聯專案:(S.projects.find(p=>p.id===l.project)||{}).name||'',
      完成:l.done||'', 完成的計畫:(l.planDone||[]).join('；'), 卡關:l.block||'',
      新增計畫:(l.plan||[]).join('；'), 下週補充:l.next||'', 連結:l.link||''}));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(lgRows), '週報');

  const plRows = [];
  studs.forEach(s=>(S.plans[s.id]||[]).forEach(i=>plRows.push({學生:s.name, 待辦計畫:i.t, 加入日期:i.added||''})));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(plRows), '待辦計畫');

  const who = studs.length===1 ? studs[0].name : '全實驗室';
  XLSX.writeFile(wb, 'ANG-lab-'+who+'-'+today()+'.xlsx');
  btn.disabled = false; btn.textContent = '📥 匯出 Export';
}

/* ---------------- passcode gate (等級二) ----------------
   驗證方式：向 Firestore 試寫一筆探測資料並夾帶輸入的碼。
   規則收緊後（見部署說明），只有正確的碼會被接受，其餘回 403。
   非 Firebase 模式（Claude／本機）無伺服器規則，改用前端軟比對。*/
async function validateGate(code){
  if(FIREBASE_PROJECT){
    try{
      const res = await fetch(fsUrl('gate_probe')+'?updateMask.fieldPaths=value&updateMask.fieldPaths=gate', {
        method:'PATCH', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({fields:{value:{stringValue:'probe'}, gate:{stringValue:code}}})
      });
      return res.ok;   // 規則放行＝碼正確
    }catch(e){ return false; }
  }
  return code === LAB_PASSCODE;   // 軟比對
}
function showGate(){
  return new Promise(resolve=>{
    const wrap = document.createElement('div');
    wrap.className = 'gate';
    wrap.innerHTML =
      '<div class="gate-card">'
      + '<div class="lock"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0a7580" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></div>'
      + '<h2>實驗室通行碼</h2>'
      + '<p>請輸入實驗室通行碼以進入。<br>沒有通行碼請向指導老師索取。</p>'
      + '<input id="gateInput" type="password" inputmode="text" placeholder="通行碼" autocomplete="off">'
      + '<button id="gateBtn">進入</button>'
      + '<div class="gate-err" id="gateErr"></div></div>';
    document.body.appendChild(wrap);
    const input = wrap.querySelector('#gateInput');
    const btn = wrap.querySelector('#gateBtn');
    const err = wrap.querySelector('#gateErr');
    input.focus();
    async function attempt(){
      const code = input.value.trim();
      if(!code){ input.focus(); return; }
      btn.disabled = true; err.textContent = '驗證中…';
      const ok = await validateGate(code);
      if(ok){
        GATE = code;
        try{ sessionStorage.setItem('lab_gate', code); }catch(e){}
        wrap.remove(); resolve();
      }else{
        btn.disabled = false; err.textContent = '通行碼不正確，請再試一次。';
        input.select();
      }
    }
    btn.addEventListener('click', attempt);
    input.addEventListener('keydown', e=>{ if(e.key==='Enter') attempt(); });
  });
}
async function startApp(){
  if(LAB_PASSCODE){   // 設定 LAB_PASSCODE 才啟用閘門；留空＝免密碼直接使用
    let saved = '';
    try{ saved = sessionStorage.getItem('lab_gate') || ''; }catch(e){}
    if(saved){ GATE = saved; }      // 本次瀏覽已通過，不重複詢問
    else { await showGate(); }
  }
  boot();
}

animateWave();
startApp();
</script>
