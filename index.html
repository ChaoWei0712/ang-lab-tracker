<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#16232b;
    --ink-soft:#41525c;
    --bg:#e9edee;
    --surface:#ffffff;
    --line:#d5dde0;
    --line-soft:#e6ecee;
    --trace:#0e9aa7;      /* oscilloscope teal */
    --trace-deep:#0a7580;
    --go:#3b9c6e;         /* on track / done */
    --warn:#e08a2b;       /* attention / blocked */
    --danger:#c65a4e;
    --track-ai:#5b6cff;
    --track-dsp:#0e9aa7;
    --track-animal:#c17d3e;
    --display:'Space Grotesk',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:var(--body);
    color:var(--ink);
    background:var(--bg);
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}

  /* ---------- header ---------- */
  .top{
    background:var(--ink);
    color:#eaf1f2;
    position:relative;
    overflow:hidden;
  }
  .top-wave{position:absolute;inset:0;width:100%;height:100%;opacity:.5}
  .top-inner{
    position:relative;
    max-width:1100px;margin:0 auto;
    padding:20px 24px 22px;
    display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .brand h1{
    font-family:var(--display);font-weight:700;font-size:20px;letter-spacing:.3px;margin:0;
  }
  .brand .tag{
    font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--trace);border:1px solid rgba(14,154,167,.5);border-radius:3px;padding:2px 7px;
  }
  .who{display:flex;align-items:center;gap:8px}
  .who label{font-family:var(--mono);font-size:11px;color:#9fb2b8;letter-spacing:.5px}
  .who select{
    background:#0e1a20;color:#eaf1f2;border:1px solid #33474f;border-radius:6px;
    padding:8px 10px;font-size:13px;min-width:150px;
  }
  .who button{
    background:transparent;color:var(--trace);border:1px solid #33474f;border-radius:6px;
    padding:8px 10px;font-size:12px;
  }
  .who button:hover{border-color:var(--trace)}

  /* ---------- tabs ---------- */
  .tabs{
    background:var(--surface);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:5;
  }
  .tabs-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;gap:2px;overflow-x:auto}
  .tab{
    background:none;border:none;padding:14px 16px;font-size:14px;color:var(--ink-soft);
    font-weight:500;border-bottom:2px solid transparent;white-space:nowrap;
  }
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--ink);border-bottom-color:var(--trace);font-weight:600}

  main{max-width:1100px;margin:0 auto;padding:26px 24px 80px}

  /* ---------- generic ---------- */
  .muted{color:var(--ink-soft)}
  .empty{
    border:1px dashed var(--line);border-radius:10px;padding:34px 20px;text-align:center;
    color:var(--ink-soft);background:var(--surface);
  }
  .empty strong{display:block;color:var(--ink);font-family:var(--display);font-size:16px;margin-bottom:6px}
  .section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .section-head h2{font-family:var(--display);font-weight:600;font-size:19px;margin:0}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--trace-deep);margin-bottom:3px}
  .btn{
    background:var(--ink);color:#fff;border:none;border-radius:7px;padding:9px 15px;font-size:13px;font-weight:500;
  }
  .btn:hover{background:#0c1a22}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--ink-soft)}
  .btn.sm{padding:6px 11px;font-size:12px}

  /* track chips */
  .chip{
    display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;
    padding:3px 8px;border-radius:20px;border:1px solid var(--line);color:var(--ink-soft);
  }
  .chip .dot{width:7px;height:7px;border-radius:50%}
  .chip.ai .dot{background:var(--track-ai)} .chip.dsp .dot{background:var(--track-dsp)} .chip.animal .dot{background:var(--track-animal)}

  /* ---------- checklist ---------- */
  .cl-head{
    display:flex;gap:22px;align-items:center;background:var(--surface);border:1px solid var(--line);
    border-radius:12px;padding:18px 22px;margin-bottom:22px;flex-wrap:wrap;
  }
  .cl-id h3{font-family:var(--display);font-size:18px;margin:0 0 4px}
  .cl-id .sub{font-family:var(--mono);font-size:12px;color:var(--ink-soft)}
  .cl-id .tracks{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
  .gauges{display:flex;gap:18px;margin-left:auto;flex-wrap:wrap}
  .gauge{text-align:center;width:78px}
  .gauge svg{display:block;margin:0 auto}
  .gauge .lab{font-family:var(--mono);font-size:10px;letter-spacing:.5px;color:var(--ink-soft);margin-top:4px;text-transform:uppercase}
  .gauge .pct{font-family:var(--display);font-weight:600;font-size:15px}

  .dim{margin-bottom:20px}
  .dim-title{
    display:flex;align-items:center;gap:9px;font-family:var(--display);font-weight:600;font-size:14px;
    margin:0 0 10px;color:var(--ink);
  }
  .dim-title .bar{width:3px;height:15px;border-radius:2px;background:var(--trace)}
  .dim-title .n{font-family:var(--mono);font-size:11px;color:var(--ink-soft);font-weight:400}
  .item{
    display:flex;gap:12px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);
    border-radius:9px;padding:12px 14px;margin-bottom:7px;cursor:pointer;transition:border-color .12s;
  }
  .item:hover{border-color:var(--trace)}
  .item.done{background:#f4faf7;border-color:#cfe8dc}
  .box{
    width:20px;height:20px;border-radius:5px;border:2px solid var(--line);flex:none;margin-top:1px;
    display:flex;align-items:center;justify-content:center;transition:.12s;
  }
  .item.done .box{background:var(--go);border-color:var(--go)}
  .box svg{opacity:0}
  .item.done .box svg{opacity:1}
  .item .txt{font-size:14px}
  .item.done .txt{color:var(--ink-soft);text-decoration:line-through;text-decoration-color:#bcd9cb}
  .item .tmark{font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:12px;margin-left:8px;vertical-align:middle;border:1px solid var(--line);color:var(--ink-soft)}
  .item-del{margin-left:auto;background:none;border:none;color:var(--ink-soft);font-size:17px;line-height:1;padding:0 4px;flex:none;align-self:center}
  .item-del:hover{color:var(--danger)}

  /* ---------- projects ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px 17px;position:relative}
  .card h3{font-family:var(--display);font-size:16px;margin:0 4px 10px 0;padding-right:60px}
  .card .owner{font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-bottom:12px}
  .status{
    position:absolute;top:15px;right:15px;font-family:var(--mono);font-size:10px;letter-spacing:.5px;
    padding:3px 8px;border-radius:20px;text-transform:uppercase;font-weight:500;
  }
  .st-todo{background:#eef1f2;color:#5b6b72}
  .st-active{background:#e5f5ef;color:#2f7d58}
  .st-blocked{background:#fbeee0;color:#b5711f}
  .st-review{background:#eae6fb;color:#5a4bb5}
  .st-done{background:#e7f0f2;color:var(--trace-deep)}
  .stage-rail{display:flex;gap:4px;margin:12px 0}
  .stage-rail .seg{flex:1;height:5px;border-radius:3px;background:var(--line-soft)}
  .stage-rail .seg.on{background:var(--trace)}
  .stage-lab{font-family:var(--mono);font-size:11px;color:var(--trace-deep);margin-bottom:12px}
  .kv{font-size:13px;margin:6px 0;color:var(--ink-soft)}
  .kv b{color:var(--ink);font-weight:600}
  .blockbox{background:#fdf5ec;border:1px solid #f2ddc2;border-radius:7px;padding:8px 10px;font-size:12.5px;color:#8a5a17;margin-top:10px}
  .links{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
  .links a{
    font-family:var(--mono);font-size:11px;color:var(--trace-deep);text-decoration:none;
    border:1px solid var(--line);border-radius:6px;padding:3px 8px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .links a:hover{border-color:var(--trace);background:#f0fafb}
  .card-actions{display:flex;gap:8px;margin-top:13px;border-top:1px solid var(--line-soft);padding-top:11px}
  .card-actions button{background:none;border:none;font-size:12px;color:var(--ink-soft);padding:2px 4px}
  .card-actions button:hover{color:var(--ink)}
  .card-actions .del:hover{color:var(--danger)}

  /* ---------- log timeline ---------- */
  .log{position:relative;padding-left:22px;margin-bottom:16px}
  .log::before{content:"";position:absolute;left:5px;top:6px;bottom:-16px;width:2px;background:var(--line)}
  .log:last-child::before{display:none}
  .log .node{position:absolute;left:0;top:5px;width:12px;height:12px;border-radius:50%;background:var(--trace);border:2px solid var(--surface);box-shadow:0 0 0 1px var(--line)}
  .log .date{font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-bottom:2px}
  .log .who-tag{font-family:var(--display);font-weight:600;font-size:13px;margin-bottom:8px}
  .log-row{font-size:13px;margin:4px 0;display:flex;gap:8px}
  .log-row .k{font-family:var(--mono);font-size:10px;letter-spacing:.5px;color:#fff;padding:1px 6px;border-radius:4px;flex:none;height:fit-content;margin-top:2px}
  .k-done{background:var(--go)} .k-block{background:var(--warn)} .k-next{background:var(--trace-deep)}

  /* ---------- overview table ---------- */
  .ov-wrap{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:12px 14px;font-size:13px;border-bottom:1px solid var(--line-soft)}
  th{font-family:var(--mono);font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-soft);background:#f6f8f8}
  tr:last-child td{border-bottom:none}
  .mini-bar{height:6px;border-radius:3px;background:var(--line-soft);width:90px;overflow:hidden;display:inline-block;vertical-align:middle}
  .mini-bar span{display:block;height:100%;background:var(--go)}
  .flag{font-family:var(--mono);font-size:11px;color:var(--warn)}
  .row-name{font-weight:600;font-family:var(--display)}
  .row-name small{display:block;font-family:var(--mono);font-weight:400;font-size:10px;color:var(--ink-soft)}

  /* ---------- modal ---------- */
  .scrim{position:fixed;inset:0;background:rgba(16,26,32,.5);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:20;overflow:auto}
  .modal{background:var(--surface);border-radius:14px;width:100%;max-width:460px;padding:24px;box-shadow:0 24px 60px rgba(0,0,0,.28)}
  .modal h3{font-family:var(--display);font-size:18px;margin:0 0 18px}
  .field{margin-bottom:14px}
  .field label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px}
  .field input,.field select,.field textarea{
    width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:14px;color:var(--ink);background:#fff;
  }
  .field textarea{resize:vertical;min-height:56px}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--trace);box-shadow:0 0 0 3px rgba(14,154,167,.13)}
  .track-pick{display:flex;gap:8px;flex-wrap:wrap}
  .track-pick .opt{border:1px solid var(--line);border-radius:20px;padding:6px 12px;font-size:13px;display:flex;align-items:center;gap:6px}
  .track-pick .opt.on{border-color:var(--trace);background:#f0fafb;color:var(--trace-deep);font-weight:500}
  .modal-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:20px}
  .hint{font-size:12px;color:var(--ink-soft);margin-top:4px}

  /* ---------- bilingual helpers ---------- */
  .h1en{font-family:var(--mono);font-size:10px;letter-spacing:1.6px;color:#9fb2b8;margin-top:2px;text-transform:uppercase}
  .ten{font-size:10.5px;color:var(--ink-soft);margin-left:5px;font-weight:400}
  .tab.active .ten{color:var(--trace-deep)}
  .ben{font-size:10px;opacity:.8;margin-left:5px;font-weight:400}
  .dim-en{font-family:var(--mono);font-size:11px;color:var(--ink-soft);font-weight:400}
  .item-en{display:block;font-size:12px;color:var(--ink-soft);margin-top:1px}
  .item.done .item-en{text-decoration:line-through;text-decoration-color:#bcd9cb}

  /* ---------- help page ---------- */
  .help-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px 22px;margin-bottom:14px}
  .help-card h3{font-family:var(--display);font-size:16px;margin:0 0 2px;display:flex;align-items:center;gap:8px}
  .help-card h3 .dim-en{font-size:11px}
  .help-en{color:var(--ink-soft);font-size:12.5px;margin-top:3px;line-height:1.5}
  .help-card p{font-size:14px;margin:8px 0 0}
  .help-card ol{margin:8px 0 0;padding-left:20px;font-size:14px}
  .help-card li{margin:8px 0}

  /* ---------- add-track row ---------- */
  .track-add{display:flex;gap:8px;margin-top:9px}
  .track-add input{flex:1;border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px;min-width:0}
  .track-pick .opt .tdot{width:8px;height:8px;border-radius:50%;flex:none}

  @media (max-width:620px){
    .gauges{margin-left:0;width:100%}
    .cl-head{padding:16px}
  }
  @media (prefers-reduced-motion:reduce){
    .top-wave{animation:none!important}
  }

  /* ---------- passcode gate ---------- */
  .gate{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
  .gate-card{background:var(--surface);border-radius:16px;padding:36px 32px;max-width:390px;width:100%;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.45)}
  .gate-card .lock{width:44px;height:44px;border-radius:12px;background:#f0fafb;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
  .gate-card h2{font-family:var(--display);font-size:22px;margin:0 0 6px;color:var(--ink)}
  .gate-card p{color:var(--ink-soft);font-size:13px;margin:0 0 20px;line-height:1.5}
  .gate-card input{width:100%;border:1px solid var(--line);border-radius:9px;padding:12px 14px;font-size:17px;text-align:center;letter-spacing:3px;color:var(--ink)}
  .gate-card input:focus{outline:none;border-color:var(--trace);box-shadow:0 0 0 3px rgba(14,154,167,.15)}
  .gate-card button{width:100%;margin-top:14px;background:var(--ink);color:#fff;border:none;border-radius:9px;padding:12px;font-size:15px;font-weight:500;cursor:pointer}
  .gate-card button:hover{background:#0c1a22}
  .gate-card button:disabled{opacity:.5;cursor:default}
  .gate-err{color:var(--danger);font-size:13px;margin-top:12px;min-height:18px}
</style>

<div class="top">
  <svg class="top-wave" id="wave" viewBox="0 0 1200 120" preserveAspectRatio="none" aria-hidden="true">
    <path id="wavePath" fill="none" stroke="var(--trace)" stroke-width="1.4" opacity="0.8"></path>
  </svg>
  <div class="top-inner">
    <div class="brand">
      <div>
        <h1 id="labName">研究室進度儀表板</h1>
        <div class="h1en">ANG Lab Progress Dashboard</div>
      </div>
      <span class="tag">Lab Signal</span>
    </div>
    <div class="who">
      <label>目前身分 Identity</label>
      <select id="whoSelect"></select>
      <button id="addStudentBtn">＋ 新增學生 Add</button>
    </div>
  </div>
</div>

<nav class="tabs">
  <div class="tabs-inner" id="tabs">
    <button class="tab active" data-view="checklist">我的檢核<span class="ten">My Checklist</span></button>
    <button class="tab" data-view="projects">我的專案<span class="ten">My Projects</span></button>
    <button class="tab" data-view="log">週報進度<span class="ten">Weekly Updates</span></button>
    <button class="tab" data-view="overview">全實驗室總覽<span class="ten">Lab Overview</span></button>
    <button class="tab" data-view="help">使用說明<span class="ten">Guide</span></button>
  </div>
</nav>

<main id="main"></main>

<div id="modalRoot"></div>

<script>
/* ============================================================
   實驗室進度儀表板 —  資料以 window.storage 持久化
   共享資料 (shared=true)：所有開啟此網頁的人看到同一份
   個人資料 (shared=false)：只記住這台裝置選了誰
   ============================================================ */

const TRACKS = {
  ai:     {label:'AI 開發',   en:'AI Development',    short:'AI',   color:'#5b6cff'},
  dsp:    {label:'訊號處理',  en:'Signal Processing', short:'DSP',  color:'#0e9aa7'},
  animal: {label:'動物飼養',  en:'Animal Care',       short:'動物', color:'#c17d3e'},
};
/* 自訂領域：存在共享儲存 lab_custom_tracks，載入後合併進 TRACKS */
const TRACK_COLORS = ['#8a56c9','#c94f7c','#4f9dc9','#7ca23f','#b3893d','#56b3a5','#d0685a','#5e7ce2'];
function mergeCustomTracks(){
  (S.customTracks||[]).forEach(t=>{
    TRACKS[t.id] = {label:t.label, en:t.en||'', short:t.short||t.label, color:t.color||TRACK_COLORS[0], custom:true};
  });
}
function trackChip(tid, useShort){
  const tr = TRACKS[tid]; if(!tr) return '';
  const txt = useShort ? tr.short : tr.label + (tr.en ? ' '+tr.en : '');
  return '<span class="chip"><span class="dot" style="background:'+tr.color+'"></span>'+esc(txt)+'</span>';
}

const LEVELS = {
  undergrad:{label:'大學部', en:'Undergrad', tiers:['U1','U2','U3']},
  master:   {label:'碩士',   en:'Master',    tiers:['G1','G2','G3','G4']},
  phd:      {label:'博士',   en:'PhD',       tiers:['D1','D2','D3']},
};

const TIER_META = {
  U1:{name:'入門期', en:'Onboarding',  yr:'第 1 學期 · 0–4 月'},
  U2:{name:'上手期', en:'Ramp-up',     yr:'第 2–3 學期 · 4–12 月'},
  U3:{name:'專題期', en:'Capstone',    yr:'12 月以上 / 專題結案前'},
  G1:{name:'定位期', en:'Orientation', yr:'碩一上'},
  G2:{name:'建置期', en:'Build-up',    yr:'碩一下'},
  G3:{name:'產出期', en:'Production',  yr:'碩二上'},
  G4:{name:'收束期', en:'Wrap-up',     yr:'碩二下'},
  D1:{name:'探索期', en:'Exploration', yr:'博一–博二'},
  D2:{name:'深化期', en:'Deepening',   yr:'博三'},
  D3:{name:'領導期', en:'Leadership',  yr:'資深博生'},
};

const DIMS = {skill:'研究技能', project:'專案進度', citizen:'實驗室成員'};
const DIMS_EN = {skill:'Research Skills', project:'Project Progress', citizen:'Lab Citizenship'};

/* 檢核項：dim=維度；track 若存在則僅該領域學生顯示 */
const CHECKS = {
  U1:[
    {id:'u1-safe', dim:'citizen', t:'完成實驗室安全與環境訓練', en:'Complete lab safety & environment training'},
    {id:'u1-note', dim:'citizen', t:'建立實驗記錄本／開發日誌，每次都記錄', en:'Keep a lab notebook / dev log and record every session'},
    {id:'u1-read', dim:'skill',   t:'讀懂 1 篇指定文獻並口頭摘要', en:'Read 1 assigned paper and give an oral summary'},
    {id:'u1-goal', dim:'project', t:'能說明所屬專案的目標與動機', en:"Able to explain your project's goal and motivation"},

/* ---------------- storage adapter ----------------
   三種後端自動切換：
   1. 在 Claude 平台開啟 → 使用內建 window.storage（全體共享）
   2. 自行部署（GitHub Pages 等）→ 填入 FIREBASE_PROJECT 即改用 Firestore 雲端資料庫
   3. 兩者皆無 → localStorage（僅存在本機瀏覽器，示範用，不跨裝置共享）*/
const FIREBASE_PROJECT = 'ang-lab-tracker';   // ← 自行部署時填入 Firebase 專案 ID，例如 'mylab-tracker'
const LAB_PASSCODE = '';       // ← 僅供本機/Claude 模式的軟比對用。Firebase 模式由 Firestore 規則驗證通行碼，此處請留空，以免公開原始碼洩露真實通行碼
let GATE = '';                 // 使用者輸入並通過的通行碼，會附在每次寫入資料中

const hasClaudeStore = (typeof window.storage !== 'undefined') && window.storage && window.storage.get;
const fsUrl = key => 'https://firestore.googleapis.com/v1/projects/'+FIREBASE_PROJECT
  +'/databases/(default)/documents/labkv/'+encodeURIComponent(key);

async function loadKey(key, shared, fallback){
  try{
    if(hasClaudeStore){
      const r = await window.storage.get(key, shared);
      return r && r.value ? JSON.parse(r.value) : fallback;
    }
    if(FIREBASE_PROJECT){
      const res = await fetch(fsUrl(key));
      if(!res.ok) return fallback;
      const d = await res.json();
      const v = d.fields && d.fields.value && d.fields.value.stringValue;
      return v ? JSON.parse(v) : fallback;
    }
    const v = localStorage.getItem('lab:'+key);
    return v ? JSON.parse(v) : fallback;
  }catch(e){ return fallback; }
}
async function saveKey(key, val, shared){
  try{
    const json = JSON.stringify(val);
    if(hasClaudeStore){ await window.storage.set(key, json, shared); return; }
    if(FIREBASE_PROJECT){
      await fetch(fsUrl(key)+'?updateMask.fieldPaths=value&updateMask.fieldPaths=gate', {
        method:'PATCH', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({fields:{value:{stringValue:json}, gate:{stringValue:GATE}}})
      });
      return;
    }
    localStorage.setItem('lab:'+key, json);
  }catch(e){ console.error('save failed', key, e); }
}

const S = { students:[], checklists:{}, projects:[], logs:[], custom:{}, customTracks:[], me:null, view:'checklist' };

async function boot(){
  S.students     = await loadKey('lab_students', true, []);
  S.checklists   = await loadKey('lab_checklists', true, {});
  S.projects     = await loadKey('lab_projects', true, []);
  S.logs         = await loadKey('lab_logs', true, []);
  S.custom       = await loadKey('lab_custom_checks', true, {});
  S.customTracks = await loadKey('lab_custom_tracks', true, []);
  mergeCustomTracks();
  S.me         = await loadKey('lab_me', false, null);
  if(S.me && !S.students.find(s=>s.id===S.me)) S.me = null;
  renderWho(); render();
}

const esc = s => (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function visibleChecks(student){
  const items = (CHECKS[student.tier] || []).filter(it => !it.track || student.tracks.includes(it.track));
  const extra = (S.custom[student.id] || []).map(c => ({...c, custom:true}));
  return items.concat(extra);
}
function checkState(sid){ return S.checklists[sid] || {}; }
function progress(student){
  const items = visibleChecks(student), st = checkState(student.id);
  const by = {skill:[0,0], project:[0,0], citizen:[0,0], all:[0,0]};
  items.forEach(it=>{ const done = !!st[it.id];
    by[it.dim][1]++; by.all[1]++; if(done){by[it.dim][0]++; by.all[0]++;} });
  return by;
}
function pct(pair){ return pair[1] ? Math.round(pair[0]/pair[1]*100) : 0; }

/* ---------------- header waveform (signature) ---------------- */
function animateWave(){
  const path = $('#wavePath'); if(!path) return;
  const reduce = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  const W=1200, H=120, mid=H/2;
  function build(t){
    let d='M 0 '+mid;
    for(let x=0;x<=W;x+=8){
      const y = mid
        + Math.sin((x*0.012)+t)*16
        + Math.sin((x*0.03)+t*1.7)*8
        + Math.sin((x*0.005)-t*0.6)*10;
      d += ' L '+x+' '+y.toFixed(1);
    }
    path.setAttribute('d', d);
  }
  if(reduce){ build(0); return; }
  let t=0; (function loop(){ t+=0.03; build(t); requestAnimationFrame(loop); })();
}

/* ---------- checklist view ---------- */
function ring(p, color){
  const r=22, c=2*Math.PI*r, off=c*(1-p/100);
  return '<svg width="56" height="56" viewBox="0 0 56 56">'
    +'<circle cx="28" cy="28" r="'+r+'" fill="none" stroke="var(--line-soft)" stroke-width="6"/>'
    +'<circle cx="28" cy="28" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="6" stroke-linecap="round" '
    +'stroke-dasharray="'+c.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'" transform="rotate(-90 28 28)"/>'
    +'<text x="28" y="33" text-anchor="middle" class="pct" fill="var(--ink)">'+p+'</text></svg>';
}

      +' <span class="dim-en">'+DIMS_EN[dim]+'</span>'

      const done = !!st[it.id];

      const cm = it.custom ? '<span class="tmark">自訂 custom</span>' : '';

function bindChecklist(){
  document.querySelectorAll('[data-cdel]').forEach(b=>b.addEventListener('click', e=>{
    e.stopPropagation();
    const s = me();
    if(confirm('刪除這個自訂檢核項？')){
      S.custom[s.id] = (S.custom[s.id]||[]).filter(c=>c.id!==b.dataset.cdel);
      if(S.checklists[s.id]) delete S.checklists[s.id][b.dataset.cdel];
      saveKey('lab_custom_checks', S.custom, true);
      saveKey('lab_checklists', S.checklists, true);
      render();
    }
  }));
  document.querySelectorAll('.item').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = el.dataset.id, s = me();
      if(!S.checklists[s.id]) S.checklists[s.id]={};
      S.checklists[s.id][id] = !S.checklists[s.id][id];
      saveKey('lab_checklists', S.checklists, true);
      render();
    });
  });
  const em = $('#editMe'); if(em) em.addEventListener('click', ()=>openStudentModal(me()));
  const ac = $('#addCheck'); if(ac) ac.addEventListener('click', openCheckModal);
}

/* ---------------- passcode gate (等級二) ----------------
   驗證方式：向 Firestore 試寫一筆探測資料並夾帶輸入的碼。
   規則收緊後（見部署說明），只有正確的碼會被接受，其餘回 403。
   非 Firebase 模式（Claude／本機）無伺服器規則，改用前端軟比對。*/
async function validateGate(code){
  if(FIREBASE_PROJECT){
    try{
      const res = await fetch(fsUrl('gate_probe')+'?updateMask.fieldPaths=value&updateMask.fieldPaths=gate', {
        method:'PATCH', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({fields:{value:{stringValue:'probe'}, gate:{stringValue:code}}})
      });
      return res.ok;   // 規則放行＝碼正確
    }catch(e){ return false; }
  }
  return code === LAB_PASSCODE;   // 軟比對
}
function showGate(){
  return new Promise(resolve=>{
    const wrap = document.createElement('div');
    wrap.className = 'gate';
    wrap.innerHTML =
      '<div class="gate-card">'
      + '<div class="lock"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0a7580" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></div>'
      + '<h2>實驗室通行碼</h2>'
      + '<p>請輸入實驗室通行碼以進入。<br>沒有通行碼請向指導老師索取。</p>'
      + '<input id="gateInput" type="password" inputmode="text" placeholder="通行碼" autocomplete="off">'
      + '<button id="gateBtn">進入</button>'
      + '<div class="gate-err" id="gateErr"></div></div>';
    document.body.appendChild(wrap);
    const input = wrap.querySelector('#gateInput');
    const btn = wrap.querySelector('#gateBtn');
    const err = wrap.querySelector('#gateErr');
    input.focus();
    async function attempt(){
      const code = input.value.trim();
      if(!code){ input.focus(); return; }
      btn.disabled = true; err.textContent = '驗證中…';
      const ok = await validateGate(code);
      if(ok){
        GATE = code;
        try{ sessionStorage.setItem('lab_gate', code); }catch(e){}
        wrap.remove(); resolve();
      }else{
        btn.disabled = false; err.textContent = '通行碼不正確，請再試一次。';
        input.select();
      }
    }
    btn.addEventListener('click', attempt);
    input.addEventListener('keydown', e=>{ if(e.key==='Enter') attempt(); });
  });
}
async function startApp(){
  if(LAB_PASSCODE){   // 設定 LAB_PASSCODE 才啟用閘門；留空＝免密碼直接使用
    let saved = '';
    try{ saved = sessionStorage.getItem('lab_gate') || ''; }catch(e){}
    if(saved){ GATE = saved; }      // 本次瀏覽已通過，不重複詢問
    else { await showGate(); }
  }
  boot();
}

animateWave();
startApp();
</script>
